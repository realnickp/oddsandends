<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="4"/>
  <!-- Ground -->
  <line x1="150" y1="410" x2="650" y2="410" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Shed front wall -->
  <rect x="260" y="260" width="280" height="150" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
  <!-- Roof -->
  <path d="M240 260 L400 170 L560 260" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Roof ridge detail -->
  <line x1="400" y1="170" x2="400" y2="165" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <!-- Roof overhang lines -->
  <line x1="240" y1="260" x2="245" y2="265" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="560" y1="260" x2="555" y2="265" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Vertical board lines on shed -->
  <line x1="305" y1="260" x2="305" y2="410" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="350" y1="260" x2="350" y2="410" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="450" y1="260" x2="450" y2="410" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="495" y1="260" x2="495" y2="410" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Double door -->
  <rect x="360" y="300" width="80" height="110" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
  <line x1="400" y1="300" x2="400" y2="410" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <!-- Door handles -->
  <circle cx="393" cy="360" r="3" fill="rgba(255,255,255,0.7)"/>
  <circle cx="407" cy="360" r="3" fill="rgba(255,255,255,0.7)"/>
  <!-- Door cross braces -->
  <line x1="362" y1="340" x2="398" y2="302" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="402" y1="340" x2="438" y2="302" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Window left -->
  <rect x="275" y="295" width="50" height="40" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <line x1="300" y1="295" x2="300" y2="335" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="275" y1="315" x2="325" y2="315" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Window right -->
  <rect x="475" y="295" width="50" height="40" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <line x1="500" y1="295" x2="500" y2="335" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="475" y1="315" x2="525" y2="315" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Roof shingle lines -->
  <line x1="280" y1="230" x2="520" y2="230" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="260" y1="245" x2="540" y2="245" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="310" y1="215" x2="490" y2="215" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="340" y1="200" x2="460" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Foundation -->
  <rect x="255" y="408" width="290" height="8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Service name -->
  <text x="400" y="510" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="3">SHEDS</text>
  <line x1="310" y1="530" x2="490" y2="530" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>