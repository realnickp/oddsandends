<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="4"/>
  <!-- Gravel pad - perspective rectangle -->
  <path d="M200 350 L350 250 L600 250 L450 350 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M200 350 L350 250 L600 250 L450 350 Z" fill="rgba(255,255,255,0.08)"/>
  <!-- Pad depth -->
  <path d="M200 350 L200 370 L450 370 L450 350 Z" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <path d="M450 350 L600 250 L600 270 L450 370 Z" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Level line indicator -->
  <line x1="310" y1="240" x2="560" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Level tool -->
  <rect x="380" y="225" width="100" height="14" rx="3" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <rect x="415" y="228" width="30" height="8" rx="4" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="430" cy="232" r="2.5" fill="rgba(255,255,255,0.7)"/>
  <!-- Gravel stones - scattered across the pad surface -->
  <!-- Row 1 -->
  <ellipse cx="280" cy="330" rx="10" ry="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" transform="rotate(-15 280 330)"/>
  <ellipse cx="310" cy="320" rx="8" ry="6" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" transform="rotate(10 310 320)"/>
  <ellipse cx="340" cy="310" rx="11" ry="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" transform="rotate(-5 340 310)"/>
  <ellipse cx="370" cy="325" rx="9" ry="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" transform="rotate(20 370 325)"/>
  <ellipse cx="400" cy="315" rx="10" ry="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <ellipse cx="430" cy="330" rx="8" ry="5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" transform="rotate(-10 430 330)"/>
  <!-- Row 2 -->
  <ellipse cx="320" cy="290" rx="9" ry="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" transform="rotate(15 320 290)"/>
  <ellipse cx="360" cy="285" rx="10" ry="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" transform="rotate(-8 360 285)"/>
  <ellipse cx="400" cy="295" rx="8" ry="6" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" transform="rotate(5 400 295)"/>
  <ellipse cx="440" cy="290" rx="11" ry="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" transform="rotate(-12 440 290)"/>
  <ellipse cx="480" cy="285" rx="9" ry="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" transform="rotate(18 480 285)"/>
  <ellipse cx="510" cy="295" rx="8" ry="5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Row 3 -->
  <ellipse cx="380" cy="270" rx="9" ry="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" transform="rotate(-20 380 270)"/>
  <ellipse cx="420" cy="265" rx="10" ry="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" transform="rotate(8 420 265)"/>
  <ellipse cx="460" cy="272" rx="8" ry="6" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" transform="rotate(-5 460 272)"/>
  <ellipse cx="500" cy="268" rx="9" ry="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" transform="rotate(12 500 268)"/>
  <ellipse cx="540" cy="275" rx="10" ry="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" transform="rotate(-15 540 275)"/>
  <!-- Scattered fill stones -->
  <ellipse cx="250" cy="340" rx="7" ry="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <ellipse cx="350" cy="340" rx="6" ry="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <ellipse cx="300" cy="305" rx="6" ry="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <ellipse cx="450" cy="305" rx="7" ry="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <ellipse cx="520" cy="282" rx="6" ry="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <ellipse cx="560" cy="265" rx="7" ry="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <!-- Ground reference lines -->
  <line x1="150" y1="370" x2="650" y2="370" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Service name -->
  <text x="400" y="510" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="3">GRAVEL PADS</text>
  <line x1="270" y1="530" x2="530" y2="530" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>