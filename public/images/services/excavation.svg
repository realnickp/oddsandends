<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="4"/>
  <!-- Ground line -->
  <path d="M0 420 Q200 410 400 420 Q600 430 800 415 L800 600 L0 600 Z" fill="#3a2a1a" opacity="0.5"/>
  <!-- Dirt mound -->
  <ellipse cx="560" cy="400" rx="80" ry="30" fill="#5a3d2b" opacity="0.7"/>
  <ellipse cx="560" cy="395" rx="70" ry="25" fill="#6b4c3b" opacity="0.6"/>
  <!-- Excavator body -->
  <rect x="260" y="300" width="120" height="60" rx="8" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
  <!-- Cab -->
  <rect x="270" y="260" width="70" height="45" rx="6" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
  <!-- Cab window -->
  <rect x="280" y="268" width="40" height="28" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Tracks -->
  <rect x="250" y="360" width="140" height="30" rx="15" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
  <circle cx="270" cy="375" r="10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="370" cy="375" r="10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="320" cy="375" r="8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Boom arm -->
  <line x1="340" y1="280" x2="420" y2="220" stroke="rgba(255,255,255,0.9)" stroke-width="6" stroke-linecap="round"/>
  <!-- Stick -->
  <line x1="420" y1="220" x2="480" y2="320" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
  <!-- Bucket -->
  <path d="M470 310 L490 340 L510 340 L500 310 Z" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Bucket teeth -->
  <line x1="475" y1="340" x2="473" y2="350" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="485" y1="340" x2="483" y2="350" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="495" y1="340" x2="493" y2="350" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="505" y1="340" x2="503" y2="350" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <!-- Hydraulic cylinder details -->
  <line x1="350" y1="305" x2="400" y2="250" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="440" y1="240" x2="470" y2="310" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <!-- Joint circles -->
  <circle cx="340" cy="280" r="5" fill="#2d3748" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
  <circle cx="420" cy="220" r="5" fill="#2d3748" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
  <!-- Service name -->
  <text x="400" y="510" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="3">EXCAVATION</text>
  <line x1="280" y1="530" x2="520" y2="530" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>